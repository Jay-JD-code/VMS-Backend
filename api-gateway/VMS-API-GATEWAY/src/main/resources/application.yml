server:
  port: 8080

spring:
  cloud:
    gateway:
     server:
       webmvc:
        routes:

          - id: VMS-AUTH
            uri: http://localhost:8081
            predicates:
              - Path=/api/auth/**
          - id: VMS-VENDOR
            uri: http://localhost:8082
            predicates:
              - Path=/api/vendors/**																															
          - id: VMS-DOCUMENT
            uri: http://localhost:8083
            predicates:
              - Path=/api/documents/**

          - id: VMS-ORDERS
            uri: http://localhost:8084
            predicates:
              - Path=/api/orders/**

          - id: VMS-PAYMENTS
            uri: http://localhost:8085
            predicates:
              - Path=/api/payments/**

          - id: VMS-PERFORMANCE
            uri: http://localhost:8086
            predicates:
              - Path=/api/performance/**

          - id: VMS-DASHBOARD
            uri: http://localhost:8087
            predicates:
              - Path=/api/dashboard/**